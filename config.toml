[hardware]
target = "apple_silicon"
neural_engine = true
interconnect = "virtual_nvqlink"

[atml]
fds_threshold = 0.015 
lambda_penalty = 0.005
max_iter = 25

[trust_engine]
min_trust_score = 0.85
audit_interval_ms = 250

[benchmarks]
speed_target = 2.5
accuracy_multiplier = 3.0

[security]
access_level = "trusted_internal"
forbidden_paths = ["01_Legal", "02_Assets", "/etc", "/root"]

[telemetry]
ledger_path = "data_lake/parquet/"
